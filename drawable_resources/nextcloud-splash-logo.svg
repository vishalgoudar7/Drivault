<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
    "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg width="100%"
    height="100%"
    viewBox="0 0 590 650"
    version="1.1"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    xml:space="preserve"
    style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">

    <!-- Black background -->
    <g id="background">
        <path d="M0,0H590V650H0Z"
            style="fill:#000000;fill-rule:nonzero;" />
    </g>

    <!-- Green folder -->
    <g id="folder">
        <path d="
            M55,160
            L55,595
            Q55,620 80,620
            L510,620
            Q535,620 535,595
            L535,195
            Q535,170 510,170
            L295,170
            L260,130
            Q248,115 230,115
            L80,115
            Q55,115 55,140
            Z"
            style="fill:#00E5A0;fill-rule:nonzero;" />
    </g>

    <!-- Main diagonal -->
    <g id="mainDiagonal">
        <path d="M510,155 L55,610"
            style="
                fill:none;
                stroke:#000000;
                stroke-width:52;
                stroke-linecap:round;
                stroke-linejoin:round;" />
    </g>

    <!-- Cross arm top-left -->
    <g id="crossTopLeft">
        <path d="M295,370 L170,245"
            style="
                fill:none;
                stroke:#000000;
                stroke-width:52;
                stroke-linecap:butt;
                stroke-linejoin:round;" />
    </g>

    <!-- Cross arm top-right -->
    <g id="crossTopRight">
        <path d="M295,370 L420,245"
            style="
                fill:none;
                stroke:#000000;
                stroke-width:52;
                stroke-linecap:round;
                stroke-linejoin:round;" />
    </g>

    <!-- Cross arm bottom-left -->
    <g id="crossBottomLeft">
        <path d="M295,370 L170,495"
            style="
                fill:none;
                stroke:#000000;
                stroke-width:52;
                stroke-linecap:round;
                stroke-linejoin:round;" />
    </g>

    <!-- Cross arm bottom-right -->
    <g id="crossBottomRight">
        <path d="M295,370 L420,495"
            style="
                fill:none;
                stroke:#000000;
                stroke-width:52;
                stroke-linecap:butt;
                stroke-linejoin:round;" />
    </g>

    <!-- Center circle -->
    <g id="centerCircle">
        <circle cx="295"
            cy="370"
            r="55"
            style="fill:#000000;" />
    </g>

</svg>